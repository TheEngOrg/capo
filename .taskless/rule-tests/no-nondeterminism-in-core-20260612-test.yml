id: no-nondeterminism-in-core
valid:
  - "const ts = opts.created_at;"
  - "const now = clock.nowIso();"
  - "const parsed = new Date(event.ts);"
  - "const event_id = randomUUID();"
  - "function nowIso(): string { return externalClock(); }"
invalid:
  - "const ts = new Date().toISOString();"
  - "const seq = Date.now();"
  - "const jitter = Math.random() * 100;"
  - "const id = `x-${Date.now()}`;"
