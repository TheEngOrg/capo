name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Bundle CLI entrypoint
        # WS-GO-02: bin/teo-run.js is gitignored (esbuild artifact).
        # Build it before tests so teo-run.test.ts subprocess tests can find it.
        run: npm run bundle

      - name: Test with coverage
        run: npm run test:cov

      - name: Lockfile sync check
        run: node scripts/check-lockfile.mjs
