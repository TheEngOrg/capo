# TEO M1 CI Pipeline
#
# Gates: lint → typecheck → test (99% coverage) → build (matrix) → smoke → gate
#
# This workflow enforces CAD discipline:
#   - MECHANICAL gate: test pass + coverage >= 99%
#   - ARCHITECTURAL gate: build artifacts present + binary smoke pass
#
# M2+ extension points are noted inline.
# Release signing (codesign, notarize, tarball upload) is NOT in scope here — that's M1 release track.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    # Manual trigger — use for spike validations and one-offs

# Cancel in-progress runs for the same PR/branch when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only permissions. Individual jobs override only what they need.
permissions:
  contents: read

env:
  BUN_VERSION: "1.3.14"

# ---------------------------------------------------------------------------
# Job: lint
# ---------------------------------------------------------------------------
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Bun ${{ env.BUN_VERSION }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lockb', 'package.json') }}
          restore-keys: |
            bun-${{ env.BUN_VERSION }}-

      - name: Install dependencies
        # --frozen-lockfile enforces lockfile integrity — no silent dep upgrades in CI.
        # Optional deps (react-devtools-core) are installed by default with bun install.
        run: bun install --frozen-lockfile

      - name: Lint
        # M1 uses TypeScript-native lint via tsc --noEmit as the primary correctness gate.
        # If a dedicated linter (eslint, biome, oxlint) is added in M2+, add the invocation here.
        # For now: check for any TypeScript file formatting issues and obvious errors.
        # Fail on any unresolved import, unused variable (strict), or type violation.
        run: bun run lint
        # NOTE: If package.json doesn't have a "lint" script yet, devs should add one.
        # Minimum viable: "lint": "tsc --noEmit" (same as typecheck, separate step for CI clarity).
        # If a lint script is absent, this job will fail — intentional. Add the script.

  # ---------------------------------------------------------------------------
  # Job: taskless  (ADVISORY — does not gate merges yet)
  #
  # Runs the Taskless rules in .taskless/rules/ against the codebase. Static
  # analysis only (safe in CI). Rules turn past review corrections into
  # permanent guards — e.g. no Date.now()/Math.random() in src/core/**.
  #
  # ROLLOUT: this job is intentionally NOT in the `gate` job's `needs` list and
  # uses continue-on-error, so a new/noisy rule can't block PRs while we tune.
  # TO ENFORCE: (1) remove `continue-on-error`, (2) add `taskless` to the gate
  # `needs` list and its result loop. Then a rule violation blocks merge.
  # ---------------------------------------------------------------------------
  taskless:
    name: Taskless (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # The Taskless CLI is distributed on npm and run via npx, so this job needs
      # Node. Every other job uses Bun — this is the one intentional exception.
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Run Taskless rules
        # Exits 1 on error-severity matches. continue-on-error keeps this advisory
        # for now — the step still shows red on the PR so violations are visible.
        run: npx --yes @taskless/cli@0.5.0 check

  # ---------------------------------------------------------------------------
  # Job: typecheck
  # ---------------------------------------------------------------------------
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Bun ${{ env.BUN_VERSION }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lockb', 'package.json') }}
          restore-keys: |
            bun-${{ env.BUN_VERSION }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        # bun run typecheck maps to: tsc --noEmit (defined in package.json scripts)
        # Fails on any TypeScript error — strict mode enforced via tsconfig.json.
        run: bun run typecheck

  # ---------------------------------------------------------------------------
  # Job: test
  # Runs on both platforms to catch any platform-specific behavior in the
  # logic layer (XDG paths, file I/O). ink-testing-library covers component
  # tests without requiring a real TTY.
  # ---------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux-x64
            runner: ubuntu-latest
          - os: darwin-arm64
            runner: macos-14
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Bun ${{ env.BUN_VERSION }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ env.BUN_VERSION }}-${{ matrix.os }}-${{ hashFiles('bun.lockb', 'package.json') }}
          restore-keys: |
            bun-${{ env.BUN_VERSION }}-${{ matrix.os }}-

      - name: Install dependencies
        # react-devtools-core is in optionalDependencies — bun install includes it by default.
        # Do NOT add --no-optional here. The bundler requires it (SPIKE-002 Test 4 finding).
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        # bun run test maps to: vitest run (defined in package.json scripts)
        # Vitest is used (not bun test) for ink-testing-library compatibility
        # and consistent coverage reporting. See M1 implementation spec Section 2.
        #
        # Coverage gate: 99% on classifier, pipelines, security, audit, repl modules.
        # UI/Ink component tests are snapshot-driven; coverage threshold applies only
        # to the logic modules. vitest.config.ts must define per-module thresholds.
        #
        # M2+ note: add --reporter=junit here and wire test results to GitHub PR
        # annotations when M2 verb-prefix routing tests land.
        run: bun run test -- --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-${{ matrix.os }}
          path: coverage/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Job: build
  # Cross-platform compile. Each matrix entry targets its own platform binary.
  # The darwin-arm64 runner builds the macOS binary natively; the linux runner
  # builds the Linux binary natively. Cross-compilation from either platform
  # works but native builds are preferred to catch platform path differences.
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: darwin-arm64
            runner: macos-14
            build-script: build:darwin
            binary-name: teo-darwin-arm64
            bun-target: bun-darwin-arm64
          - os: linux-x64
            runner: ubuntu-latest
            build-script: build:linux
            binary-name: teo-linux-x64
            bun-target: bun-linux-x64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Bun ${{ env.BUN_VERSION }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ env.BUN_VERSION }}-${{ matrix.os }}-${{ hashFiles('bun.lockb', 'package.json') }}
          restore-keys: |
            bun-${{ env.BUN_VERSION }}-${{ matrix.os }}-

      - name: Install dependencies
        # react-devtools-core must be present before the compile step.
        # bun install with optionalDependencies handles this automatically.
        run: bun install --frozen-lockfile

      - name: Build binary (${{ matrix.os }})
        # bun run build:darwin / build:linux maps to:
        #   bun build --compile --target=<bun-target> src/index.tsx --outfile dist/<binary-name>
        #
        # RELEASE_PUBLIC_KEY is injected as a CI secret. In M1 dev CI, this is a
        # placeholder key (empty string or a dev key). Real signing keys land in the
        # M1 release pipeline (separate workflow, not this file).
        #
        # M1 note: if RELEASE_PUBLIC_KEY secret is not yet configured, build:darwin/linux
        # scripts should handle an empty/missing value gracefully (keys.ts stub accepts it).
        # The OQ-3 long-PEM gate test is a manual step on M1 sprint day 1 — not CI-gated here.
        env:
          RELEASE_PUBLIC_KEY: ${{ secrets.RELEASE_PUBLIC_KEY }}
        run: bun run ${{ matrix.build-script }}

      - name: Record binary size and SHA-256
        # Audit trail: size and hash logged to job output for traceability.
        # These numbers should be monitored for unexpected growth between builds.
        # Binary sizes from SPIKE-002: ~65MB macOS arm64, ~96MB Linux x64.
        run: |
          echo "=== Binary: dist/${{ matrix.binary-name }} ==="
          ls -lh dist/${{ matrix.binary-name }}
          wc -c < dist/${{ matrix.binary-name }} | xargs -I{} echo "Size (bytes): {}"
          shasum -a 256 dist/${{ matrix.binary-name }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binary-${{ matrix.os }}
          path: dist/${{ matrix.binary-name }}
          retention-days: 14
          # M2+ note: bump retention to 30 days and add to release artifact set
          # when the release signing workflow is wired in.

  # ---------------------------------------------------------------------------
  # Job: smoke
  # Runs the compiled binary with --version and --help.
  # Confirms the binary is executable, exits 0, and produces non-empty stdout.
  # Does NOT run the interactive REPL — that requires a real TTY.
  # ---------------------------------------------------------------------------
  smoke:
    name: Smoke (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: darwin-arm64
            runner: macos-14
            binary-name: teo-darwin-arm64
          - os: linux-x64
            runner: ubuntu-latest
            binary-name: teo-linux-x64
    steps:
      - name: Download binary artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binary-${{ matrix.os }}
          path: dist/

      - name: Make binary executable
        run: chmod +x dist/${{ matrix.binary-name }}

      - name: Smoke test -- --version
        run: |
          OUTPUT=$(dist/${{ matrix.binary-name }} --version)
          EXIT_CODE=$?
          echo "Exit code: $EXIT_CODE"
          echo "Output: $OUTPUT"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "FAIL: --version exited $EXIT_CODE"
            exit 1
          fi
          if [ -z "$OUTPUT" ]; then
            echo "FAIL: --version produced empty stdout"
            exit 1
          fi
          echo "PASS: --version"

      - name: Smoke test -- --help
        run: |
          OUTPUT=$(dist/${{ matrix.binary-name }} --help)
          EXIT_CODE=$?
          echo "Exit code: $EXIT_CODE"
          echo "Output: $OUTPUT"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "FAIL: --help exited $EXIT_CODE"
            exit 1
          fi
          if [ -z "$OUTPUT" ]; then
            echo "FAIL: --help produced empty stdout"
            exit 1
          fi
          echo "PASS: --help"

      # M2+ note: when verb-prefix routing lands, add a smoke test that pipes
      # a non-interactive classify call (e.g., echo input | teo --batch) here.

  # ---------------------------------------------------------------------------
  # Job: gate
  # Single aggregation job. This is the required status check for PR merges.
  # If any upstream job fails, this job fails.
  # Configure branch protection to require "CI / Gate" to pass before merge.
  # ---------------------------------------------------------------------------
  gate:
    name: Gate
    needs: [lint, typecheck, test, build, smoke]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          echo "Checking job results..."
          echo "lint:      ${{ needs.lint.result }}"
          echo "typecheck: ${{ needs.typecheck.result }}"
          echo "test:      ${{ needs.test.result }}"
          echo "build:     ${{ needs.build.result }}"
          echo "smoke:     ${{ needs.smoke.result }}"

          FAILED=0
          for RESULT in \
            "${{ needs.lint.result }}" \
            "${{ needs.typecheck.result }}" \
            "${{ needs.test.result }}" \
            "${{ needs.build.result }}" \
            "${{ needs.smoke.result }}"; do
            if [ "$RESULT" != "success" ]; then
              echo "FAIL: job result was '$RESULT' (expected 'success')"
              FAILED=1
            fi
          done

          if [ $FAILED -ne 0 ]; then
            echo ""
            echo "Gate BLOCKED: one or more jobs did not pass."
            echo "Fix the failing job(s) above before this PR can merge."
            exit 1
          fi

          echo ""
          echo "Gate PASSED: all jobs succeeded."
